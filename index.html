<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로토 티켓</title>
  <link rel="stylesheet" href="./styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script defer src="./app.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="control-panel no-print">
      <div class="panel-head simple">
        <div>
          <h1>프로토 티켓</h1>
        </div>
      </div>

      <div class="panel-section">
        <label class="field-label" for="ticketTitle">상단 제목</label>
        <input id="ticketTitle" class="text-input" type="text" value="프로토 (승부식)" />
      </div>

      <div class="panel-section">
        <label class="field-label" for="sourceText">조합 입력</label>
        <textarea id="sourceText" class="text-area" spellcheck="false"></textarea>

      </div>

      <div class="panel-actions">
        <button id="renderBtn" class="btn btn-primary" type="button">슬립 생성</button>
        <button id="sampleBtn" class="btn btn-secondary" type="button">예시 복원</button>
        <button id="printBtn" class="btn btn-ghost" type="button">전체 인쇄</button>
        <button id="clearBtn" class="btn btn-ghost" type="button">입력 비우기</button>
      </div>

      <div class="stats-grid minimal">
        <div class="stat-card">
          <span class="stat-label">조합</span>
          <strong id="comboCount" class="stat-value">0</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">제외</span>
          <strong id="ignoredCount" class="stat-value">0</strong>
        </div>
      </div>

      <div id="statusBox" class="status-box hidden"></div>
      <div id="validationList" class="validation-list hidden"></div>
    </aside>

    <main class="workspace">
      <div class="workspace-header simple no-print">
        <div>
          <h2 id="workspaceTitle">프로토 (승부식)</h2>
        </div>
      </div>

      <div id="ticketList" class="ticket-list"></div>
    </main>
  </div>
</body>
</html>
