<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로토 슬립 생성기</title>
  <link rel="stylesheet" href="./styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script defer src="./app.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="control-panel no-print">
      <div class="panel-head simple">
        <div>
          <h1>슬립 생성기</h1>
        </div>
      </div>

      <div class="panel-section">
        <label class="field-label" for="ticketTitle">제목</label>
        <input id="ticketTitle" class="text-input" type="text" value="프로토 (승부식)" />
      </div>

      <div class="panel-section">
        <label class="field-label" for="sourceText">조합 입력</label>
        <textarea
          id="sourceText"
          class="text-area"
          spellcheck="false"
          placeholder="예시&#10;1조합&#10;011패 061무 072무 077무 185패 203패 289무 305무 319무 344무 (2,000원) (47,287.015배)"
        ></textarea>
      </div>

      <div class="panel-actions">
        <button id="renderBtn" class="btn btn-primary" type="button">슬립 생성</button>
        <button id="sampleBtn" class="btn btn-secondary" type="button">예시 복원</button>
        <button id="printBtn" class="btn btn-ghost" type="button">전체 인쇄</button>
        <button id="clearBtn" class="btn btn-ghost" type="button">입력 비우기</button>
      </div>

      <div id="statusBox" class="status-box"></div>
    </aside>

    <main class="workspace">
      <div id="ticketList" class="ticket-list"></div>
    </main>
  </div>
</body>
</html>
