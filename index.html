<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>슬립 티켓 생성기</title>
  <link rel="stylesheet" href="./styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script defer src="./app.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="control-panel no-print">
      <div class="panel-head">
        <div class="panel-badge">TT</div>
        <div>
          <h1>슬립 티켓 생성기</h1>
          <p>공유용 티켓 이미지를 빠르게 만들 수 있는 정적 웹 버전입니다.</p>
        </div>
      </div>

      <div class="panel-section">
        <label class="field-label" for="ticketTitle">상단 제목</label>
        <input id="ticketTitle" class="text-input" type="text" value="토토 슬립" />
      </div>

      <div class="panel-section">
        <label class="field-label" for="sourceText">조합 입력</label>
        <textarea id="sourceText" class="text-area" spellcheck="false"></textarea>
        <p class="field-help">
          한 줄 입력, 줄바꿈 입력, 1만원 / 10,000원 / 99배 / 99.99배 / (99.90배) 형식을 폭넓게 인식합니다.
        </p>
      </div>

      <div class="panel-actions">
        <button id="renderBtn" class="btn btn-primary" type="button">슬립 생성</button>
        <button id="sampleBtn" class="btn btn-secondary" type="button">예시 복원</button>
        <button id="printBtn" class="btn btn-ghost" type="button">전체 인쇄</button>
        <button id="clearBtn" class="btn btn-ghost" type="button">입력 비우기</button>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">인식 조합</span>
          <strong id="comboCount" class="stat-value">0</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">제외 항목</span>
          <strong id="ignoredCount" class="stat-value">0</strong>
        </div>
      </div>

      <div id="statusBox" class="status-box">슬립을 생성하면 상태가 여기에 표시됩니다.</div>
      <div id="validationList" class="validation-list"></div>
    </aside>

    <main class="workspace">
      <div class="workspace-header no-print">
        <div>
          <span class="workspace-kicker">Share-ready tickets</span>
          <h2 id="workspaceTitle">토토 슬립</h2>
        </div>
        <div class="workspace-chips">
          <span class="workspace-chip">이미지 복사</span>
          <span class="workspace-chip">PNG 저장</span>
          <span class="workspace-chip">인쇄 최적화</span>
        </div>
      </div>

      <div id="ticketList" class="ticket-list"></div>
    </main>
  </div>
</body>
</html>
